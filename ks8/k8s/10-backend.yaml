apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-backend
  namespace: crypto-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crypto-backend
  template:
    metadata:
      labels:
        app: crypto-backend
    spec:
      containers:
        - name: backend
          image: YOUR_DOCKERHUB/crypto-backend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /api/tickers
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tickers
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: crypto-backend-svc
  namespace: crypto-dashboard
spec:
  type: ClusterIP
  selector:
    app: crypto-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
